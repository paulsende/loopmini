<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>LOOP Sandbox Mobile</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#f4f4f1; }

    canvas { touch-action:none; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
    .panel { position:fixed; left:18px; top:18px; width:314px; background:rgba(255,255,255,.82); backdrop-filter:blur(18px); border:1px solid rgba(0,0,0,.08); border-radius:18px; padding:14px; box-shadow:0 20px 60px rgba(0,0,0,.08); color:#151515; }

    .sub { font-size:11px; line-height:1.35; color:#555; margin-bottom:12px; }
    button { appearance:none; border:0; border-radius:12px; padding:9px 10px; font-size:12px; background:#171717; color:white; cursor:pointer; }
    button.secondary { background:rgba(0,0,0,.07); color:#111; }
    button.active { outline:2px solid rgba(0,0,0,.55); }
    button.toggleOn { background:#f7c9da; color:#111; }
    button.toggleOff { background:rgba(0,0,0,.13); color:#111; }
    button:active { transform:translateY(1px); }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:9px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; margin-bottom:9px; }
    .wide { width:100%; margin-bottom:7px; }
    .colors { display:grid; grid-template-columns:repeat(4, 1fr); gap:7px; margin:8px 0 12px; }
    .swatch { height:28px; border-radius:999px; border:1px solid rgba(0,0,0,.18); box-shadow:inset 0 2px 5px rgba(255,255,255,.65); }
    .right { position:fixed; right:18px; top:18px; font-size:12px; color:#444; background:rgba(255,255,255,.64); backdrop-filter:blur(14px); border:1px solid rgba(0,0,0,.08); padding:10px 12px; border-radius:14px; }
    label { font-size:11px; color:#555; display:block; margin:8px 0 4px; }
    input[type="range"] { width:100%; }
    #errorBox { display:none; position:fixed; right:18px; bottom:18px; max-width:520px; font-size:12px; color:#5a1111; background:rgba(255,235,235,.9); border:1px solid rgba(120,0,0,.18); padding:10px 12px; border-radius:14px; }
    #rotateHud { display:none; position:fixed; transform:translate(-50%, -50%); flex-direction:column; gap:5px; align-items:center; pointer-events:auto; z-index:5; }
    #rotateHud .rotRow { display:flex; gap:6px; align-items:center; }
    #rotateHud button { width:36px; height:36px; border-radius:999px; padding:0; font-size:16px; line-height:1; background:rgba(20,20,20,.88); color:white; box-shadow:0 8px 24px rgba(0,0,0,.18); }
    #rotateHud .tag { font-size:10px; color:#111; background:rgba(255,255,255,.72); border:1px solid rgba(0,0,0,.08); padding:5px 7px; border-radius:999px; backdrop-filter:blur(12px); min-width:34px; text-align:center; }
    #camPad { position:fixed; right:18px; bottom:18px; width:58px; height:58px; border-radius:999px; background:rgba(20,20,20,.88); box-shadow:0 8px 24px rgba(0,0,0,.22); display:flex; align-items:center; justify-content:center; touch-action:none; cursor:grab; z-index:6; -webkit-user-select:none; user-select:none; }
    #camPad:active { cursor:grabbing; }
    #camPad svg { width:28px; height:28px; pointer-events:none; }

    #introLoader { position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center; background:#fff; color:#111; text-align:center; padding:24px; transition:opacity .45s ease, visibility .45s ease; pointer-events:none; }
    #introLoader.hidden { opacity:0; visibility:hidden; }
    #introLoader .introTitle { line-height:1.45; text-transform:uppercase; font-size:13px; font-weight:650; letter-spacing:.13em; }
    #introLoader .mobileTitleBreak { display:none; }
    #introLoader .introMini { display:block; margin-top:10px; font-size:10px; font-weight:500; letter-spacing:.08em; opacity:.45; }
    #introLoader .introProgressWrap { width:min(260px, 62vw); height:1px; margin:16px auto 0; background:rgba(0,0,0,.12); overflow:hidden; }
    #introLoader .introProgressBar { width:0%; height:100%; background:#111; transition:width .12s linear; }
    #introLoader .introPercent { margin-top:8px; font-size:10px; font-weight:500; letter-spacing:.08em; opacity:.5; }

    /* Mobile / touch layout: conserva la lógica desktop y sólo cambia interfaz + gestos */
    @media (max-width: 760px), (pointer: coarse) {
      html, body {
        position:fixed;
        inset:0;
        width:100%;
        height:100%;
        overflow:hidden;
        overscroll-behavior:none;
        -webkit-user-select:none;
        user-select:none;
        -webkit-touch-callout:none;
      }
      #app {
        width:100vw;
        height:100dvh;
        min-height:100svh;
      }
      .right {
        top:calc(8px + env(safe-area-inset-top));
        right:8px;
        font-size:10px;
        padding:6px 8px;
        border-radius:999px;
        background:rgba(255,255,255,.72);
      }
      .panel {
        left:8px;
        right:8px;
        top:auto;
        bottom:calc(8px + env(safe-area-inset-bottom));
        width:auto;
        max-height:33dvh;
        max-height:33svh;
        overflow:auto;
        border-radius:18px;
        padding:8px;
        background:rgba(255,255,255,.90);
      }
      h1 { font-size:11px; margin:0 0 6px; line-height:1.15; }
      .sub, label, .colors { display:none !important; }
      button {
        min-height:36px;
        padding:7px 8px;
        font-size:12px;
        border-radius:13px;
        touch-action:manipulation;
      }
      .wide { margin-bottom:6px; }
      .grid, .grid3 { gap:6px; margin-bottom:6px; }
      .grid3 { grid-template-columns:1fr 1fr 1fr; }
      .panel > .grid:last-child { display:none; }
      #rotateHud {
        left:50% !important;
        top:auto !important;
        bottom:calc(33dvh + 24px + env(safe-area-inset-bottom));
        transform:translateX(-50%);
      }
      #rotateHud button { width:40px; height:40px; font-size:17px; }
      #rotateHud .tag { font-size:10px; padding:5px 7px; }
      #errorBox {
        left:8px;
        right:8px;
        bottom:calc(33dvh + 82px + env(safe-area-inset-bottom));
        max-width:none;
      }
      #camPad {
        right:calc(8px + env(safe-area-inset-right));
        bottom:calc(33dvh + 24px + env(safe-area-inset-bottom));
        width:50px;
        height:50px;
      }
      #camPad svg { width:24px; height:24px; }
      #introLoader .mobileTitleBreak { display:block; }
    }

  </style>
</head>
<body>
  <div id="introLoader"><div class="introTitle">LOOP MINI DIGITAL PLAYGROUND<span class="mobileTitleBreak"></span> X PAUL SENDE<span class="introMini">cargando módulos</span><div class="introProgressWrap"><div class="introProgressBar" id="introProgressBar"></div></div><div class="introPercent" id="introPercent">0%</div></div></div>
  <div id="app"></div>
  <div class="panel">
    <h1>LOOP MINI PLAYGROUND X PAUL SENDE</h1>
    <button class="wide" id="add">Agregar módulo</button>
    <div class="grid">
      <button class="secondary" id="dup">Duplicar</button>
      <button class="secondary" id="del">Borrar</button>
    </div>
    <div class="grid" style="margin-top:14px;">
      <button class="secondary" id="shuffle">Rotar colores</button>
      <button class="secondary" id="randomColor">Color random</button>
    </div>
    <button class="secondary wide toggleOn" id="snap" style="margin-top:14px;">Snap: ON</button>
    <button class="secondary wide toggleOn" id="zMove">BLOQUEO EJE Z: ON</button>
    <div class="grid" style="margin-top:14px;">
      <button class="secondary" id="clear">Limpiar</button>
      <button class="secondary" id="shot">Captura</button>
    </div>
  </div>
  <div class="right" id="counter">Cargando módulo...</div>
  <div id="errorBox"></div>
  <div id="rotateHud">
    <div class="rotRow"><button id="hudRotXL" title="X -90°">↺</button><span class="tag">X 90°</span><button id="hudRotXR" title="X +90°">↻</button></div>
    <div class="rotRow"><button id="hudRotL" title="Z -90°">↺</button><span class="tag">Z 90°</span><button id="hudRotR" title="Z +90°">↻</button></div>
  </div>
  <div id="camPad" title="Arrastrá para mover la cámara">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="5 9 2 12 5 15"></polyline>
      <polyline points="9 5 12 2 15 5"></polyline>
      <polyline points="15 19 12 22 9 19"></polyline>
      <polyline points="19 9 22 12 19 15"></polyline>
      <line x1="2" y1="12" x2="22" y2="12"></line>
      <line x1="12" y1="2" x2="12" y2="22"></line>
    </svg>
  </div>
  <script>
    window.addEventListener('error', (event) => { const box = document.getElementById('errorBox'); box.style.display='block'; box.textContent='Error: '+(event.message||'revisar consola'); });
  </script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.165.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/", "fflate": "https://unpkg.com/fflate@0.8.2/esm/browser.js" } }
  </script>
  <script type="module">

    import { gunzipSync, strFromU8 } from 'fflate';

    const container = document.getElementById('app');

    scene.fog = null;

    renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio, IS_TOUCH ? 1.5 : 2)); renderer.shadowMap.enabled=true; renderer.outputColorSpace = THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=0.585; renderer.setClearColor(0xffffff, 1); container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.0972));

    const key = new THREE.DirectionalLight(0xffffff,3.1); key.position.set(4,8,5); key.castShadow=true; key.shadow.mapSize.set(2048,2048); scene.add(key);

    let introActive = false, introStarted = false, introPieces = [], lastFrameTime = performance.now();

    renderer.domElement.addEventListener('touchmove', e => e.preventDefault(), {passive:false});
    const raycaster = new THREE.Raycaster(); const pointer = new THREE.Vector2(); const dragPlane = new THREE.Plane(new THREE.Vector3(0,0,1), -lockedDepthZ); const dragPoint = new THREE.Vector3(); const dragOffset = new THREE.Vector3(); let isDraggingPiece = false; let pointerMoved = false;
    let audioCtx = null;
    function playSnapSound() {
      try {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const duration = 0.035;
        const buffer = audioCtx.createBuffer(1, Math.ceil(audioCtx.sampleRate * duration), audioCtx.sampleRate);

        for(let i=0; i<data.length; i++) {

        filter.frequency.setValueAtTime(1450, now);
        filter.Q.setValueAtTime(0.8, now);

        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start(now);
        noise.stop(now + duration);
      } catch(e) {}
    }

    function createGlossyMaterial(color) {
      return new THREE.MeshPhysicalMaterial({ color, metalness, roughness, clearcoat:1, clearcoatRoughness:.06, envMapIntensity:.2268, side:THREE.DoubleSide });
    }

    function getBaseColors() {
      return [0xf4a7c2,0x124baa,0xf8f6ee,0x0a0a0a];
    }
    function getPalette(offset=0) {
      const base = getBaseColors();
      return [0,1,2,3].map(i => base[(i+offset)%4]);
    }
    function getRandomPalette() {
      const base = getBaseColors();
      return [0,1,2,3].map(() => base[Math.floor(Math.random() * base.length)]);
    }

    function buildGeometry(item) {
      const v = item.vertices;
      const f = item.faces;
      const positions = new Float32Array(f.length * 9);
      let p = 0;
      for (let i=0; i<f.length; i++) {
        const face = f[i];
        for (let j=0; j<3; j++) {
          const vert = v[face[j]];
          positions[p++] = vert[0];
          positions[p++] = vert[1];
          positions[p++] = vert[2];

      }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geom.computeVertexNormals();
      geom.computeBoundingBox();
      geom.computeBoundingSphere();
      return geom;
    }

    function loadRawGeometries() {
      const raw = strFromU8(gunzipSync(b64ToU8(GEOM_GZIP_BASE64)));
      const items = JSON.parse(raw);
      templateGeometries = items.map(buildGeometry);
      computeSnapConnectorFaces(items);
    }

    function computeSnapConnectorFaces(items) {
      const verts = [];
      items.forEach(item => item.vertices.forEach(v => verts.push(new THREE.Vector3(v[0], v[1], v[2]))));
      if(!verts.length) return;
      const eps = 0.003;
      let minY = Infinity, maxX = -Infinity;
      verts.forEach(v => { if(v.y < minY) minY = v.y; if(v.x > maxX) maxX = v.x; });
      const bottom = verts.filter(v => Math.abs(v.y - minY) < eps);
      const right = verts.filter(v => Math.abs(v.x - maxX) < eps);
      function faceFrom(points, side) {
        const b = new THREE.Box3().setFromPoints(points);
        const c = b.getCenter(new THREE.Vector3());
        if(side === 'bottom') {
          c.y = minY;
          return { side, center:c.clone(), normal:new THREE.Vector3(0, -1, 0), length:b.max.x - b.min.x };

        c.x = maxX;

    function createModule(offset=0) {
      const group = new THREE.Group();

    }

      const palette = root.userData.customPalette || getPalette(offset);

    function randomizeSelectedColors() {
      if(!selected) return;
      selected.userData.customPalette = getRandomPalette();

    }

    function lockDepth(obj) { if(zLockOn) obj.position.z = lockedDepthZ; }

    }
    function resolveOverlaps(moving) {
      for(let iter=0; iter<10; iter++) {
        let changed = false;
        let mb = box2D(moving);
        for(const other of pieces) {
          if(other === moving) continue;
          const ob = box2D(other);
          if(!overlaps2D(mb, ob)) continue;
          const pushLeft = ob.minX - mb.maxX;
          const pushRight = ob.maxX - mb.minX;
          const pushDown = ob.minY - mb.maxY;
          const pushUp = ob.maxY - mb.minY;
          const options = [
            { axis:'x', value:pushLeft }, { axis:'x', value:pushRight },
            { axis:'y', value:pushDown }, { axis:'y', value:pushUp }
          ].sort((u,v)=>Math.abs(u.value)-Math.abs(v.value));
          const push = options[0];
          if(push.axis === 'x') moving.position.x += push.value + Math.sign(push.value || 1) * 0.045;
          else moving.position.y += push.value + Math.sign(push.value || 1) * 0.045;
          clampAboveFloor(moving);
          changed = true;
          mb = box2D(moving);
        }
        if(!changed) return false;
      }
      return true;
    }
    function trySnap(moving) {
      if(!snapOn || pieces.length < 2) { resolveOverlaps(moving); return false; }

      normalizeRotation(moving);
      clampAboveFloor(moving);
      moving.updateMatrixWorld(true);

      const movingFaces = getSnapFaces(moving);
      let best = null;

      for(const other of pieces) if(other !== moving) {
        normalizeRotation(other);
        other.updateMatrixWorld(true);
        const otherFaces = getSnapFaces(other);
        for(const mf of movingFaces) for(const oface of otherFaces) {
          // Las dos caras de conexión tienen que estar enfrentadas en 3D.
          const facing = mf.normal.dot(oface.normal) < -0.985;
          if(!facing) continue;

          const delta = oface.center.clone().sub(mf.center);
          const pull = delta.length();
          if(pull > 1.15) continue;

          // Si el módulo está parado/acostado en X, el snap sigue funcionando
          // porque ya no proyectamos las caras al plano XY: se comparan en 3D.
          const normalMiss = Math.abs(delta.dot(oface.normal));
          const tangentMiss = Math.sqrt(Math.max(0, pull * pull - normalMiss * normalMiss));
          const lengthPenalty = Math.abs(mf.length - oface.length) * 0.18;
          const score = normalMiss + tangentMiss * 0.75 + lengthPenalty;
          if(!best || score < best.score) best = { delta, pull, score };
        }
      }

      if(best) {
        if(best.pull > 0.002) {
          moving.position.add(best.delta);
          lockDepth(moving);
          clampAboveFloor(moving);
          playSnapSound();
        }
        return true;
      }

      resolveOverlaps(moving);
      return false;
    }
    function saveState() {
      const data = pieces.map(p=>({ position:p.position.toArray(), rotation:[p.rotation.x,p.rotation.y,p.rotation.z], colorOffset:p.userData.colorOffset||0, customPalette:p.userData.customPalette||null }));
      localStorage.setItem('loop-sandbox-save', JSON.stringify(data));
    }
    function loadState() {
      const raw = localStorage.getItem('loop-sandbox-save'); if(!raw) return;
      clearAll();
      JSON.parse(raw).forEach(d=>{
        const p = addPiece(new THREE.Vector3(...d.position), d.rotation, d.colorOffset, false);
        if(p && d.customPalette) { p.userData.customPalette = d.customPalette; applyPalette(p, p.userData.colorOffset || 0); }
      });
      if(pieces[0]) select(pieces[0]);
    }
    function clearAll() { pieces.forEach(p=>scene.remove(p)); pieces=[]; selected=null; transform.detach(); updateCounter(); }
    function screenShot() { const a=document.createElement('a'); a.href=renderer.domElement.toDataURL('image/png'); a.download='loop-sandbox-captura.png'; a.click(); }
    function pinRotateHud() {
      const hud = document.getElementById('rotateHud');
      const r = hud.getBoundingClientRect();
      if(r.width && r.height) {
        hudPinned = true;
        hudPinnedX = r.left + r.width / 2;
        hudPinnedY = r.top + r.height / 2;
      }
    }
    function unpinRotateHud() { hudPinned = false; }
    function updateRotateHud() {
      const hud = document.getElementById('rotateHud');
      if(!selected) { hud.style.display = 'none'; hudPinned = false; return; }
      if(hudPinned) {
        hud.style.left = hudPinnedX + 'px';
        hud.style.top = hudPinnedY + 'px';
        hud.style.display = 'flex';
        return;
      }
      const b = new THREE.Box3().setFromObject(selected);
      const p = b.getCenter(new THREE.Vector3());
      p.y = b.max.y + 0.38;
      p.project(camera);
      const x = (p.x * 0.5 + 0.5) * innerWidth;
      const y = (-p.y * 0.5 + 0.5) * innerHeight;
      hud.style.left = x + 'px';
      hud.style.top = y + 'px';
      hud.style.display = 'flex';
    }

    function setIntroProgress(value) {
      const v = Math.max(0, Math.min(100, Math.round(value)));
      const bar = document.getElementById('introProgressBar');
      const percent = document.getElementById('introPercent');
      if(bar) bar.style.width = v + '%';
      if(percent) percent.textContent = v + '%';
    }
    function hideIntroLoader() {
      setIntroProgress(100);
      const loader = document.getElementById('introLoader');
      if(loader) loader.classList.add('hidden');
    }
    function buildIntroTarget(existingBoxes, obj, spreadX, spreadZ) {
      // Posiciones iniciales más bajas y centradas.
      // El eje Z queda alineado en 0 para que no aparezcan módulos desplazados en profundidad.
      // Usamos settleOnFloor() para que el piso invisible sea realmente la base de apoyo.
      const slot = existingBoxes.length;
      const spacing = IS_TOUCH ? 1.95 : 2.65;
      const x = (slot - 1) * spacing;
      const z = lockedDepthZ;

      obj.position.set(x, 0, z);
      settleOnFloor(obj);
      obj.updateMatrixWorld(true);

      const target = obj.position.clone();
      existingBoxes.push(new THREE.Box3().setFromObject(obj).expandByScalar(0.22));
      return target;
    }
    function startIntroRain() {
      clearAll();
      introActive = true;
      introStarted = true;
      introPieces = [];
      orbit.enabled = false;
      unpinRotateHud();

      const count = 3;
      const spreadX = IS_TOUCH ? 5.2 : 7.0;
      const spreadZ = IS_TOUCH ? 2.8 : 4.0;
      const targetBoxes = [];

      for(let i=0; i<count; i++) {
        const p = createModule(Math.floor(Math.random() * 4));
        p.userData.customPalette = getRandomPalette();
        applyPalette(p, p.userData.colorOffset || 0);

        // Los 3 módulos arrancan con la misma rotación en X: 90°.
        p.rotation.x = Math.PI;
        p.rotation.y = 0;
        p.rotation.z = Math.random() < 0.5 ? 0 : Math.PI / 2;
        normalizeRotation(p);

        const target = buildIntroTarget(targetBoxes, p, spreadX, spreadZ);
        p.userData.freezeTarget = target.clone();
        p.position.set(
          target.x + (Math.random() - 0.5) * 0.45,
          target.y + 3.4 + Math.random() * 1.4 + i * 0.25,
          target.z
        );

        p.userData.velocity = new THREE.Vector3(
          (target.x - p.position.x) * 0.012,
          -0.032 - Math.random() * 0.025,
          (target.z - p.position.z) * 0.012
        );
        p.userData.spin = new THREE.Vector3(
          (Math.random() - 0.5) * 0.026,
          0,
          (Math.random() - 0.5) * 0.038
        );
        p.userData.falling = true;
        p.userData.freezeDelay = i * 120 + Math.random() * 260;
        p.userData.birth = performance.now();
        scene.add(p);
        pieces.push(p);
        introPieces.push(p);
      }
      updateCounter();
      hideIntroLoader();
    }
    function finishIntroRain() {
      introActive = false;
      orbit.enabled = true;
      introPieces.forEach(p => {
        p.userData.falling = false;
        if(p.userData.freezeTarget) p.position.copy(p.userData.freezeTarget);
        normalizeRotation(p);
        lockDepth(p);
      });
      if(pieces[0]) select(pieces[0]);
      updateCounter();
    }
    function updateIntroRain(dt) {
      if(!introActive) return;
      let fallingCount = 0;
      const now = performance.now();
      introPieces.forEach((p) => {
        if(!p.userData.falling) return;
        fallingCount++;
        const target = p.userData.freezeTarget;
        const v = p.userData.velocity;
        const spin = p.userData.spin;

        // Caída con leve atracción hacia la posición final, para evitar que se encimen.
        if(target) {
          v.x += (target.x - p.position.x) * 0.020 * dt;
          v.z += (target.z - p.position.z) * 0.020 * dt;
        }
        v.y -= 1.05 * dt;
        p.position.x += v.x * 60 * dt;
        p.position.y += v.y * 60 * dt;
        p.position.z += v.z * 60 * dt;
        p.rotation.x += spin.x * 60 * dt;
        p.rotation.z += spin.z * 60 * dt;

        const canFreeze = now - p.userData.birth > p.userData.freezeDelay;
        if(canFreeze && target && p.position.y <= target.y) {
          p.userData.falling = false;
          p.position.copy(target);
          normalizeRotation(p);
        }
      });
      if(fallingCount === 0 || (introStarted && introPieces[0] && now - introPieces[0].userData.birth > 5000)) finishIntroRain();
    }

    try {
      transform.setMode('translate');
      setIntroProgress(8);
      loadRawGeometries();
      updateCounter();
      const loadingStarted = performance.now();
      const loadingDuration = 950;
      function animateIntroLoading() {
        const t = Math.min(1, (performance.now() - loadingStarted) / loadingDuration);
        setIntroProgress(8 + t * 92);
        if(t < 1) requestAnimationFrame(animateIntroLoading);
        else startIntroRain();
      }
      requestAnimationFrame(animateIntroLoading);
    } catch(err) {
      const box = document.getElementById('errorBox'); box.style.display='block'; box.textContent='No se pudo reconstruir la geometría cruda.';
      console.error(err);
    }

    function updatePointer(event) {
      pointer.x = (event.clientX / innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
    }
    renderer.domElement.addEventListener('pointerdown', (event)=>{
      if(introActive) return;
      if(transform.dragging) return;
      unpinRotateHud();
      event.preventDefault();
      updatePointer(event);
      const hits = raycaster.intersectObjects(pieces, true);
      if(hits.length) {
        let obj = hits[0].object;
        while(obj && !obj.userData.isModule) obj = obj.parent;
        if(obj) {
          select(obj);
          isDraggingPiece = true;
          pointerMoved = false;
          orbit.enabled = false;
          renderer.domElement.setPointerCapture?.(event.pointerId);
          const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
          dragPlane.setFromNormalAndCoplanarPoint(camDir, selected.position);
          if(raycaster.ray.intersectPlane(dragPlane, dragPoint)) dragOffset.copy(selected.position).sub(dragPoint);
        }
      } else { select(null); }
    });
    renderer.domElement.addEventListener('pointermove', (event)=>{
      if(transform.dragging) return;
      if(isDraggingPiece) event.preventDefault();
      if(!isDraggingPiece || !selected) return;
      pointerMoved = true;
      updatePointer(event);
      if(raycaster.ray.intersectPlane(dragPlane, dragPoint)) {
        selected.position.copy(dragPoint).add(dragOffset);
        lockDepth(selected);
        clampAboveFloor(selected);
        updateRotateHud();
      }
    });
    renderer.domElement.addEventListener('pointerup', (event)=>{
      if(transform.dragging) return;
      event.preventDefault();
      if(!isDraggingPiece) return;
      isDraggingPiece = false;
      orbit.enabled = true;
      renderer.domElement.releasePointerCapture?.(event.pointerId);
      if(selected) { lockDepth(selected); clampAboveFloor(selected); if(snapOn && pointerMoved) trySnap(selected); else resolveOverlaps(selected); lockDepth(selected); }
      updateRotateHud();
    });
    renderer.domElement.addEventListener('pointercancel', ()=>{ isDraggingPiece=false; orbit.enabled=true; });

    document.getElementById('add').onclick = ()=>{ if(!introActive) addPiece(new THREE.Vector3((Math.random()-.5)*2,0,0)); };
    document.getElementById('dup').onclick = duplicateSelected;
    document.getElementById('del').onclick = deleteSelected;
    document.getElementById('hudRotXL').onclick = (e)=>{ e.stopPropagation(); pinRotateHud(); rotateAxis('x', -1); };
    document.getElementById('hudRotXR').onclick = (e)=>{ e.stopPropagation(); pinRotateHud(); rotateAxis('x', 1); };
    document.getElementById('hudRotL').onclick = (e)=>{ e.stopPropagation(); pinRotateHud(); rotateZ(-1); };
    document.getElementById('hudRotR').onclick = (e)=>{ e.stopPropagation(); pinRotateHud(); rotateZ(1); };
    document.getElementById('shuffle').onclick = shuffleColors;
    document.getElementById('randomColor').onclick = randomizeSelectedColors;
    document.getElementById('clear').onclick = clearAll;
    document.getElementById('shot').onclick = screenShot;
    function setToggleButtonState(button, isOn) {
      button.classList.toggle('toggleOn', isOn);
      button.classList.toggle('toggleOff', !isOn);
    }
    document.getElementById('snap').onclick = ()=>{
      snapOn = !snapOn;
      const btn = document.getElementById('snap');
      btn.textContent = `Snap: ${snapOn ? 'ON' : 'OFF'}`;
      setToggleButtonState(btn, snapOn);
    };

    function toggleZLock() {
      zLockOn = !zLockOn;
      const btn = document.getElementById('zMove');
      btn.textContent = `BLOQUEO EJE Z: ${zLockOn ? 'ON' : 'OFF'}`;
      setToggleButtonState(btn, zLockOn);
      transform.showZ = !zLockOn;
      if(zLockOn) {
        pieces.forEach(p => lockDepth(p));
        if(selected) lockDepth(selected);
      }
      updateRotateHud();
    }
    document.getElementById('zMove').onclick = toggleZLock;


    addEventListener('keydown', (e)=>{
      if(e.target.tagName==='INPUT') return;
      if(e.key==='a' || e.key==='A') addPiece(new THREE.Vector3((Math.random()-.5)*2,0,0));
      if(e.key==='d' || e.key==='D') duplicateSelected();
      if(e.key==='Delete' || e.key==='Backspace') deleteSelected();
      if(e.key==='s' || e.key==='S') { snapOn=!snapOn; document.getElementById('snap').textContent=`Snap: ${snapOn?'ON':'OFF'}`; }
      if(e.key==='q' || e.key==='Q') rotateZ(-1);
      if(e.key==='e' || e.key==='E') rotateZ(1);
      if(e.key==='r' || e.key==='R') rotateAxis('x', 1);
      if(e.key==='f' || e.key==='F') rotateAxis('x', -1);
      if(e.key==='z' || e.key==='Z') toggleZLock();
    });

    (function setupCamPad(){
      const camPad = document.getElementById('camPad');
      let active = false, lastX = 0, lastY = 0;
      const panSpeedPad = IS_TOUCH ? 0.0022 : 0.0016;
      function start(e) {
        e.preventDefault();
        unpinRotateHud();
        active = true; lastX = e.clientX; lastY = e.clientY;
        camPad.setPointerCapture?.(e.pointerId);
        orbit.enabled = false;
      }
      function move(e) {
        if(!active) return;
        e.preventDefault();
        const dx = e.clientX - lastX, dy = e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY;
        // Traslada la cámara y su punto de mira juntos, a lo largo de los
        // ejes locales de la cámara, en vez de rotar alrededor del target.
        const distance = camera.position.distanceTo(orbit.target);
        const speed = distance * panSpeedPad;
        const xAxis = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
        const yAxis = new THREE.Vector3(0,1,0).applyQuaternion(camera.quaternion);
        const move = new THREE.Vector3()
          .addScaledVector(xAxis, -dx * speed)
          .addScaledVector(yAxis, dy * speed);
        camera.position.add(move);
        orbit.target.add(move);
      }
      function end() { active = false; orbit.enabled = true; }
      camPad.addEventListener('pointerdown', start);
      camPad.addEventListener('pointermove', move);
      camPad.addEventListener('pointerup', end);
      camPad.addEventListener('pointercancel', end);
    })();

    addEventListener('resize', ()=>{ unpinRotateHud(); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio, IS_TOUCH ? 1.5 : 2)); });
    renderer.setAnimationLoop(()=>{ const now = performance.now(); const dt = Math.min(0.05, (now - lastFrameTime) / 1000); lastFrameTime = now; updateIntroRain(dt); orbit.update(); updateRotateHud(); renderer.render(scene,camera); });
  </script>
</body>
</html>
